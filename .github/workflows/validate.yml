name: Validate

on:
  push:
  pull_request:

jobs:
  web-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/signage_db
      DATABASE_URL_UNPOOLED: postgresql://user:password@localhost:5432/signage_db
      NEXTAUTH_SECRET: test-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      INTERNAL_WORKER_SECRET: test-worker-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test:api
      - run: npm run test:ui
      - run: npm run build

  player-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: player
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-runtime.txt -r requirements-test.txt
      - run: python -m pytest -q

  e2e-local-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/signage_db
      DATABASE_URL_UNPOOLED: postgresql://user:password@localhost:5432/signage_db
      NEXTAUTH_SECRET: test-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      INTERNAL_WORKER_SECRET: test-worker-secret
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            qa_automation/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install QA dependencies
        run: npm ci
        working-directory: qa_automation

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: qa_automation

      - name: Run local smoke
        run: npm run test:local
        working-directory: qa_automation

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-local-smoke-report
          path: |
            qa_automation/playwright-report
            qa_automation/test-results
